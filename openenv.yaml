spec_version: 1
name: advanced-email-triage
type: space
runtime: fastapi
app: backend.main:app
port: 7860
description: A real-world enterprise email triage operations environment. Trains agents on multi-turn routing, SLA management, sentiment analysis, and escalation governance.
tags:
  - openenv
  - enterprise-ops
  - email-triage
  - rl-challenge
  - human-in-the-loop

tasks:
  - task_id: task-email-classification-easy
    title: Email Classification
    difficulty: easy
    description: Predict the business category of an email.
    required_outputs:
      - category
    reward_weights:
      category: 1.0
    max_steps: 1
    supports_threading: false
    grader: graders.email_grader.grade_action
  - task_id: task-triage-medium
    title: Classification and Priority
    difficulty: medium
    description: Classify the email and assign proper priority and routing.
    required_outputs:
      - category
      - priority
      - department
    reward_weights:
      category: 0.4
      priority: 0.3
      department: 0.3
    max_steps: 2
    supports_threading: true
    grader: graders.email_grader.grade_action
  - task_id: task-full-enterprise-hard
    title: Full Enterprise Triage
    difficulty: hard
    description: Handle multi-turn enterprise triage including routing, escalation, and human review gating.
    required_outputs:
      - category
      - priority
      - department
      - spam
      - sentiment
      - urgency
      - response_draft
      - escalation
    reward_weights:
      category: 0.2
      priority: 0.15
      department: 0.15
      spam: 0.1
      sentiment: 0.1
      urgency: 0.1
      response_draft: 0.1
      escalation: 0.1
    max_steps: 3
    supports_threading: true
    grader: graders.email_grader.grade_action
